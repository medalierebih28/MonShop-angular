


<div class="container">

    

  <div class="form-card">

    <h2>➕ Ajouter Produit</h2>

    <div class="form-group">
      <label>Nom du produit</label>
      <input [(ngModel)]="name" placeholder="Ex: iPhone 15">
    </div>

    <div class="form-group">
      <label>Prix</label>
      <input type="number" [(ngModel)]="price" placeholder="Ex: 1500">
    </div>

    <div class="form-group">
      <label>Stock</label>
      <input type="number" [(ngModel)]="stock" placeholder="Ex: 10">
    </div>

   <div class="form-group">
  <label>Image produit</label>
  <input type="file" (change)="onFileSelected($event)">
</div>

<img *ngIf="imageBase64" [src]="imageBase64" class="preview">

    <button (click)="addProduct()">Ajouter</button>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

  </div>

</div>
